<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SandTV - Configura Playlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --accent: #8B5CF6;
            --accent-dark: #6D28D9;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-hint: #666666;
            --error: #EF4444;
            --success: #22C55E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, rgba(26, 26, 26, 0.9), rgba(26, 26, 26, 0.8));
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 28px;
            margin-top: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 14px;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 14px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .session-info {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .session-icon {
            font-size: 20px;
        }

        .session-text {
            flex: 1;
        }

        .session-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .session-code {
            font-family: monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
        }

        .tab-selector {
            display: flex;
            background: rgba(15, 15, 15, 0.6);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid var(--bg-tertiary);
            border-radius: 12px;
            padding: 0 16px;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            background: rgba(37, 37, 37, 0.4);
        }

        .input-icon {
            font-size: 18px;
            margin-right: 12px;
            opacity: 0.5;
        }

        .input-wrapper:focus-within .input-icon {
            opacity: 1;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            padding: 14px 0;
            font-family: inherit;
            outline: none;
        }

        input::placeholder {
            color: var(--text-hint);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .message.error {
            display: flex;
            background: rgba(239, 68, 68, 0.15);
            color: var(--error);
        }

        .message.success {
            display: flex;
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .success-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .success-screen.active {
            display: block;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .success-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .success-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo"><img src="../logo.png" alt="SandTV"></div>
            <h1 class="title">SandTV</h1>
            <p class="subtitle">Configura la tua playlist</p>
        </div>

        <div class="session-info">
            <span class="session-icon">🔗</span>
            <div class="session-text">
                <div class="session-label">Sessione collegata</div>
                <div class="session-code" id="sessionCode">------</div>
            </div>
        </div>

        <div id="formContent">
            <div class="tab-selector">
                <button class="tab-btn active" onclick="switchTab('m3u')">M3U / URL</button>
                <button class="tab-btn" onclick="switchTab('xtream')">Xtream</button>
            </div>

            <div id="messageBox" class="message"></div>

            <!-- M3U Form -->
            <div id="m3uForm" class="form-section active">
                <div class="form-group">
                    <label class="form-label">Nome playlist</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🏷️</span>
                        <input type="text" id="m3uName" placeholder="Es: La mia IPTV">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">URL M3U</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔗</span>
                        <input type="url" id="m3uUrl" placeholder="http://example.com/playlist.m3u">
                    </div>
                </div>
            </div>

            <!-- Xtream Form -->
            <div id="xtreamForm" class="form-section">
                <div class="form-group">
                    <label class="form-label">Nome playlist</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🏷️</span>
                        <input type="text" id="xtreamName" placeholder="Es: La mia IPTV">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Server URL</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🌐</span>
                        <input type="url" id="xtreamServer" placeholder="http://example.com">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="xtreamUsername" placeholder="Il tuo username">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="xtreamPassword" placeholder="La tua password">
                    </div>
                </div>
            </div>

            <button class="submit-btn" id="submitBtn" onclick="submitForm()">
                Invia alla TV
            </button>
        </div>

        <div id="successScreen" class="success-screen">
            <div class="success-icon">✅</div>
            <h2 class="success-title">Fatto!</h2>
            <p class="success-text">I dati sono stati inviati alla TV.<br>Puoi chiudere questa pagina.</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // Firebase configuration - REPLACE WITH YOUR CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCNKR_DY2bFq9hg-QPAt1zLwVg-AyFRUfg",
            authDomain: "sandtv-581c1.firebaseapp.com",
            databaseURL: "https://sandtv-581c1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sandtv-581c1",
            storageBucket: "sandtv-581c1.firebasestorage.app",
            messagingSenderId: "889206308108",
            appId: "1:889206308108:web:cacf6863b65d2402545d29"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Get session code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionCode = urlParams.get('session');

        if (sessionCode) {
            document.getElementById('sessionCode').textContent = sessionCode;
        } else {
            showMessage('Sessione non valida. Scansiona di nuovo il QR code.', 'error');
            document.getElementById('submitBtn').disabled = true;
        }

        let currentTab = 'm3u';

        function switchTab(tab) {
            currentTab = tab;

            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update form visibility
            document.getElementById('m3uForm').classList.toggle('active', tab === 'm3u');
            document.getElementById('xtreamForm').classList.toggle('active', tab === 'xtream');

            hideMessage();
        }

        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = (type === 'error' ? '⚠️ ' : '✅ ') + text;
            box.className = 'message ' + type;
        }

        function hideMessage() {
            document.getElementById('messageBox').className = 'message';
        }

        function submitForm() {
            hideMessage();

            if (!sessionCode) {
                showMessage('Sessione non valida', 'error');
                return;
            }

            let data = {
                type: currentTab,
                timestamp: Date.now()
            };

            if (currentTab === 'm3u') {
                const name = document.getElementById('m3uName').value.trim();
                const url = document.getElementById('m3uUrl').value.trim();

                if (!name || !url) {
                    showMessage('Compila tutti i campi', 'error');
                    return;
                }

                data.name = name;
                data.url = url;
            } else {
                const name = document.getElementById('xtreamName').value.trim();
                const server = document.getElementById('xtreamServer').value.trim();
                const username = document.getElementById('xtreamUsername').value.trim();
                const password = document.getElementById('xtreamPassword').value.trim();

                if (!name || !server || !username || !password) {
                    showMessage('Compila tutti i campi', 'error');
                    return;
                }

                data.name = name;
                data.server = server;
                data.username = username;
                data.password = password;
            }

            // Disable button and show loading
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Invio in corso...';

            // Send to Firebase
            database.ref('sessions/' + sessionCode).set(data)
                .then(() => {
                    // Show success screen
                    document.getElementById('formContent').classList.add('hidden');
                    document.getElementById('successScreen').classList.add('active');
                })
                .catch((error) => {
                    console.error('Error:', error);
                    showMessage('Errore durante l\'invio. Riprova.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Invia alla TV';
                });
        }
    </script>
</body>

</html>
